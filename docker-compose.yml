version: '3.8'

services:
  # HiveMQ Community Edition - MQTT Broker
  hivemq:
    image: hivemq/hivemq-ce:2024.1
    container_name: hivemq-broker
    ports:
      - "1883:1883"      # MQTT
      - "8883:8883"      # MQTT over TLS
      - "8080:8080"      # Control Center
      - "1884:1884"      # MQTT over WebSocket
    volumes:
      - ./hivemq-config:/opt/hivemq/config
      - ./hivemq-data:/opt/hivemq/data
      - ./hivemq-extensions:/opt/hivemq/extensions
    environment:
      - HIVEMQ_ALLOW_ALL_CLIENTS=true
      - HIVEMQ_CONTROL_CENTER_ENABLED=true
      - HIVEMQ_MAX_QUEUED_MESSAGES=1000
      - HIVEMQ_RETAINED_MESSAGE_MAX=10000
    networks:
      - iot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ThingsBoard Community Edition
  thingsboard:
    image: thingsboard/tb-postgres:3.7.0
    container_name: thingsboard
    ports:
      - "9090:9090"      # HTTP
      - "1885:1883"      # MQTT
      - "7070:7070"      # Edge RPC
    environment:
      - TB_QUEUE_TYPE=in-memory
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/thingsboard
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - TB_MQTT_ENABLED=true
      - TB_MQTT_BIND_PORT=1883
    volumes:
      - thingsboard-data:/data
      - thingsboard-logs:/var/log/thingsboard
    depends_on:
      - postgres
    networks:
      - iot-network
    restart: unless-stopped

  # PostgreSQL for ThingsBoard
  postgres:
    image: postgres:15
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=thingsboard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 01
  gateway-floor-01:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-01
    ports:
      - "1881:1880"
    environment:
      - NODE_NAME=floor-01
      - FLOOR_NUMBER=01
    volumes:
      - ./node-red-flows/floor-01:/data
      - ./node-red-modules:/data/node_modules
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 02
  gateway-floor-02:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-02
    ports:
      - "1882:1880"
    environment:
      - NODE_NAME=floor-02
      - FLOOR_NUMBER=02
    volumes:
      - ./node-red-flows/floor-02:/data
      - ./node-red-modules:/data/node_modules
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 03
  gateway-floor-03:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-03
    ports:
